image: golang:1.25-alpine

stages:
  - lint
  - test
  - build
  - docker

lint:
  stage: lint
  before_script:
    - go install github.com/a-h/templ/cmd/templ@latest
    - templ generate
  script:
    - go vet ./...
    - test -z "$(gofmt -l .)"
  allow_failure: false

test:
  stage: test
  before_script:
    - go install github.com/a-h/templ/cmd/templ@latest
    - templ generate
  script:
    - go test -v -count=1 ./...
  coverage: '/\d+\.\d+% of statements/'

build:
  stage: build
  before_script:
    - go install github.com/a-h/templ/cmd/templ@latest
    - templ generate
  script:
    - go build -o durpdeploy ./cmd/server
  artifacts:
    paths:
      - durpdeploy
    expire_in: 1 week
  needs: ["lint", "test"]

docker:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:latest
    entrypoint: [""]
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA --destination $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  needs: ["build"]
