image: golang:1.26-alpine

# Tests spin up real bash via os/exec to run deployment scripts. The alpine
# base image doesn't ship bash by default, so install it before any stage
# that runs the test suite.
stages:
  - lint
  - test
  - build
  - docker

default:
  before_script:
    - apk add --no-cache bash

lint:
  stage: lint
  before_script:
    - apk add --no-cache bash
    - go install github.com/a-h/templ/cmd/templ@latest
    - templ generate
  script:
    - go vet ./...
    - test -z "$(gofmt -l .)"
  allow_failure: false

test:
  stage: test
  before_script:
    - apk add --no-cache bash
    - go install github.com/a-h/templ/cmd/templ@latest
    - templ generate
  script:
    - go test -v -count=1 ./...
  coverage: '/\d+\.\d+% of statements/'

build:
  stage: build
  before_script:
    - go install github.com/a-h/templ/cmd/templ@latest
    - templ generate
  script:
    - go build -o durpdeploy ./cmd/server
  artifacts:
    paths:
      - durpdeploy
    expire_in: 1 week
  needs: ["lint", "test"]

